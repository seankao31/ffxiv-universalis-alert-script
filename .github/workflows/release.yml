name: Release to update branch

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bunx jest --no-coverage

      - name: Build userscript
        run: bun run build.js

      - name: Extract meta file
        run: sed -n '/==UserScript==/,/==\/UserScript==/p' ffxiv-universalis-alert.user.js > ffxiv-universalis-alert.meta.js

      - name: Deploy to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash built files before wiping the working tree
          cp ffxiv-universalis-alert.user.js /tmp/ffxiv-universalis-alert.user.js
          cp ffxiv-universalis-alert.meta.js /tmp/ffxiv-universalis-alert.meta.js

          # Create an orphan branch with only the two release files
          git checkout --orphan release-tmp
          git rm -rf .
          cp /tmp/ffxiv-universalis-alert.user.js ffxiv-universalis-alert.user.js
          cp /tmp/ffxiv-universalis-alert.meta.js ffxiv-universalis-alert.meta.js
          git add ffxiv-universalis-alert.user.js ffxiv-universalis-alert.meta.js
          git commit -m "Release ${GITHUB_REF_NAME:-manual}"

          # Force-push to the release branch
          git push origin release-tmp:release --force
